<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Sekolah</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <main class="app">
    <section id="authPage" class="auth-page">
      <div class="brand">
        <span class="logo">AS</span>
        <div>
          <h1>Absensi Sekolah</h1>
          <p>Masuk sebagai admin, guru, atau siswa.</p>
        </div>
      </div>

      <div class="auth-box">
        <div class="tabs">
          <button id="loginTab" class="tab active" type="button">Masuk</button>
          <button id="registerTab" class="tab" type="button">Pendaftaran</button>
        </div>

        <form id="loginForm" class="form active">
          <label>User
            <div class="select-wrapper">
              <select id="loginRole" required>
                <option value="admin">Admin</option>
                <option value="guru">Guru</option>
                <option value="user">Murid</option>
              </select>
            </div>
          </label>
          <label>Username
            <input id="loginUsername" type="text" required>
          </label>
          <label>Password
            <div class="password-wrapper">
              <input id="loginPassword" type="password" required>
              <i id="toggleLoginPassword" class="fa-solid fa-eye"></i>
            </div>
          </label>
          <button class="primary-btn" type="submit">Masuk</button>
          <p id="loginMessage" class="message"></p>
        </form>

        <form id="registerForm" class="form">
          <label>User
            <div class="select-wrapper">
              <select id="registerRole" required>
                <option value="user">Murid</option>
                <option value="guru">Guru</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </label>
          <label>Nama Lengkap
            <input id="registerName" type="text" required>
          </label>
          <label>Kelas
            <input id="registerClass" type="text" required>
          </label>
          <label>Username
            <input id="registerUsername" type="text" required>
          </label>
          <label>Password
            <div class="password-wrapper">
              <input id="registerPassword" type="password" required>
              <i id="toggleRegisterPassword" class="fa-solid fa-eye"></i>
            </div>
          </label>
          <button class="primary-btn" type="submit">Daftar</button>
          <p id="registerMessage" class="message"></p>
        </form>
      </div>
    </section>

    <section id="dashboardPage" class="dashboard-page hidden">
      <header class="topbar">
        <div>
          <p id="roleLabel" class="eyebrow">Panel</p>
          <h2 id="dashboardTitle">Dashboard</h2>
          <p id="welcomeText" class="muted"></p>
        </div>
        <button id="logoutBtn" class="secondary-btn" type="button">Keluar</button>
      </header>

      <div id="summaryContainer" style="display: flex; flex-direction: column; gap: 18px; margin-bottom: 18px; width: 100%;">
        
        <div id="muridSummaryRow" class="summary" style="display: grid; margin-bottom: 0; background: transparent; border: none; box-shadow: none; padding: 0;">
          <div>
            <span id="totalSiswa">0</span>
            <p>Total Murid</p>
          </div>
          <div>
            <span id="totalHadir">0</span>
            <p>Hadir</p>
          </div>
          <div>
            <span id="totalTidakHadir">0</span>
            <p>Tidak Hadir</p>
          </div>
        </div>

        <div id="guruSummaryRow" class="summary" style="display: grid; margin-bottom: 0; background: transparent; border: none; box-shadow: none; padding: 0;">
          <div>
            <span id="totalGuru">0</span>
            <p>Total Guru</p>
          </div>
          <div>
            <span id="totalGuruHadir">0</span>
            <p>Hadir</p>
          </div>
          <div>
            <span id="totalGuruTidakHadir">0</span>
            <p>Tidak Hadir</p>
          </div>
        </div>

      </div>

      <section id="adminPanel" class="panel hidden">
        <h3>Data Akun Terdaftar</h3>
        <div id="userList" class="list"></div>
      </section>

      <section id="studentFormPanel" class="panel hidden">
        <div style="margin-bottom: 22px;">
          <h3 style="margin-bottom: 14px;">Tambah Guru</h3>
          <form id="guruForm" class="student-form-row">
            <input id="guruName" type="text" placeholder="Nama guru" required>
            <input id="guruClass" type="text" placeholder="Kelas" required>
            <button class="primary-btn" type="submit">Tambah</button>
          </form>
        </div>

        <div>
          <h3 style="margin-bottom: 14px;">Tambah Murid</h3>
          <form id="studentForm" class="student-form-row">
            <input id="studentName" type="text" placeholder="Nama siswa" required>
            <input id="studentClass" type="text" placeholder="Kelas" required>
            <button class="primary-btn" type="submit">Tambah</button>
          </form>
        </div>
      </section>`

      <section id="userPanel" class="panel hidden">
        <h3>Absensi Saya</h3>
        <p id="myStatus" class="muted"></p>
        <div id="myAttendanceButtons" class="status-buttons"></div>
      </section>

  <section id="attendancePanel" class="hidden" style="background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; display: grid; gap: 18px;">
        
        <div id="guruAttendanceBox" class="panel" style="margin-bottom: 0 !important;">
          <h3 style="margin-bottom: 14px;">Data Kehadiran Guru</h3>
          <div id="guruList"></div>
        </div>

        <div id="studentAttendanceBox" class="panel" style="margin-bottom: 0 !important;">
          <h3 id="studentBoxTitle" style="margin-bottom: 14px;">Data Kehadiran Murid</h3>
          <div id="studentList"></div>
        </div>

      </section>
      
    </section> 
  </main>

  <script src="script.js"></script>
</body>
</html>
